<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graffiti Report - iPhone 15 Preview</title>
    <style>
      :root {
        font-family: Arial, Helvetica, sans-serif;
        color: #173635;
        background: #dfe9e6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        background:
          linear-gradient(135deg, rgba(11, 93, 94, 0.12), transparent 36%),
          #dfe9e6;
      }

      .preview {
        display: grid;
        gap: 16px;
        justify-items: center;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        text-align: center;
      }

      p {
        margin: 0;
        color: #52706c;
        text-align: center;
      }

      .phone {
        width: 430px;
        height: 900px;
        border-radius: 58px;
        padding: 18px;
        background: #161c1b;
        box-shadow: 0 30px 80px rgba(23, 54, 53, 0.28);
        position: relative;
      }

      .phone::before {
        content: "";
        position: absolute;
        top: 20px;
        left: 50%;
        width: 126px;
        height: 36px;
        transform: translateX(-50%);
        border-radius: 999px;
        background: #080b0b;
        z-index: 2;
      }

      iframe {
        width: 393px;
        height: 852px;
        border: 0;
        border-radius: 42px;
        background: #f8fbfa;
        overflow: hidden;
      }

      @media (max-width: 520px) {
        body {
          padding: 10px;
        }

        .phone {
          width: min(100vw - 20px, 430px);
          height: calc((min(100vw - 20px, 430px) - 36px) * 852 / 393 + 36px);
          border-radius: 44px;
          padding: 18px;
        }

        iframe {
          width: 100%;
          height: 100%;
          border-radius: 32px;
        }
      }
    </style>
  </head>
  <body>
    <main class="preview">
      <div>
        <h1>iPhone 15 Preview</h1>
        <p>Graffiti Report running at mobile size</p>
      </div>
      <section class="phone" aria-label="iPhone 15 simulator frame">
        <iframe src="./index.html?demo=1&amp;screen=reports" title="Graffiti Report app preview"></iframe>
      </section>
    </main>
  </body>
</html>
