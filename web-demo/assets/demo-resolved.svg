<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">School-friendly resolved report image</title>
  <desc id="desc">A simple illustration of a repaired, clean city street with a resolved status sign.</desc>
  <rect width="900" height="560" fill="#e9f5f0"/>
  <rect y="350" width="900" height="210" fill="#8ea39e"/>
  <rect x="80" y="115" width="740" height="250" rx="12" fill="#f1dfbf"/>
  <g fill="#d3c09e">
    <rect x="110" y="145" width="170" height="48" rx="5"/>
    <rect x="300" y="145" width="160" height="48" rx="5"/>
