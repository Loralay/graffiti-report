    <rect x="130" y="220" width="220" height="44" rx="5"/>
    <rect x="370" y="220" width="180" height="44" rx="5"/>
    <rect x="570" y="220" width="190" height="44" rx="5"/>
  </g>
  <rect x="245" y="390" width="410" height="42" rx="21" fill="#61736f"/>
